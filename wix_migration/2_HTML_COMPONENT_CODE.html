<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: transparent; }
    canvas { 
      border: 3px dashed #002855; 
      background-color: white; 
      border-radius: 12px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
      max-width: 100%; 
      height: auto;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@400;700&family=Roboto+Flex:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="stampCanvas" width="450" height="250"></canvas>
  <script>
    const canvas = document.getElementById('stampCanvas');
    const ctx = canvas.getContext('2d');
    
    // Wix se comunicará con este iframe a través de postMessage
    window.onmessage = function(event) {
      if (event.data) {
        const { text, font, color } = event.data;
        drawStamp(text || 'Tu texto aquí...', font || 'Montserrat', color || '#002855');
      }
    };

    function drawStamp(text, font, color) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Borde del sello
      ctx.strokeStyle = color;
      ctx.lineWidth = 5;
      ctx.setLineDash([10, 5]);
      ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
      ctx.setLineDash([]);
      
      // Texto del sello
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `bold 32px "${font}", sans-serif`;
      
      const lines = text.split('\n');
      const lineHeight = 40;
      const startY = (canvas.height / 2) - ((lines.length - 1) * lineHeight / 2);
      
      lines.forEach((line, index) => {
        ctx.fillText(line, canvas.width / 2, startY + (index * lineHeight));
      });
      
      const base64 = canvas.toDataURL("image/png");
      window.parent.postMessage({ type: 'stamp_generated', dataUrl: base64 }, "*");
    }
    
    // Dibujo inicial de demostración
    drawStamp("TU MARCA AQUÍ", "Montserrat", "#002855");
  </script>
</body>
</html>
